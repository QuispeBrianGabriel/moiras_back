services:
  backend:
    container_name: moiras_back_dev
    image: moiras_back_dev
    stdin_open: true
    tty: true
    user: '${CURRENT_UID}:${CURRENT_GID}'
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - '8080:8080'
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/moiras
      - SPRING_DATASOURCE_USERNAME=moiras
      - SPRING_DATASOURCE_PASSWORD=moiras
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
      - gradle_cache:/gradle-cache

  db:
    image: postgres:17-alpine
    container_name: moiras_back_db_dev
    environment:
      - POSTGRES_DB=moiras
      - POSTGRES_USER=moiras
      - POSTGRES_PASSWORD=moiras
    ports:
      - '5432:5432'
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U moiras -d moiras']
      interval: 3s
      timeout: 3s
      retries: 10

volumes:
  gradle_cache:
    name: moiras_back_gradle_cache
  db_data:
    name: moiras_back_db_data
